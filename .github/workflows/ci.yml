name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    uses: SamuelMarks/c-ci/.github/workflows/c-cmake-ci.yml@master

  test_bindings:
    name: Test Bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential gcc g++ ruby ruby-dev python3 python3-pip npm default-jdk default-jre

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Setup Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: "5.10"

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: false

    - name: Build C Library
      run: |
        mkdir build
        cd build
        cmake ..
        make

    - name: Test Python Bindings
      env:
        LD_LIBRARY_PATH: ${{ github.workspace }}/build
        DYLD_LIBRARY_PATH: ${{ github.workspace }}/build
      run: |
        cd bindings
        python3 test_bindings.py

    - name: Test Ruby Bindings
      env:
        LD_LIBRARY_PATH: ${{ github.workspace }}/build
        DYLD_LIBRARY_PATH: ${{ github.workspace }}/build
      run: |
        cd bindings
        gem install minitest ffi
        ruby test_ruby.rb
        ruby test_bindings.rb

    - name: Test TypeScript Bindings
      env:
        LD_LIBRARY_PATH: ${{ github.workspace }}/build
        DYLD_LIBRARY_PATH: ${{ github.workspace }}/build
      run: |
        cd bindings
        npm install
        npm test

    - name: Test Go Bindings
      env:
        LD_LIBRARY_PATH: ${{ github.workspace }}/build
        DYLD_LIBRARY_PATH: ${{ github.workspace }}/build
      run: |
        cd bindings
        go test -v

    - name: Test C# Bindings
      env:
        LD_LIBRARY_PATH: ${{ github.workspace }}/build
        DYLD_LIBRARY_PATH: ${{ github.workspace }}/build
      run: |
        cd bindings/csharp/MountSandbox.Tests
        dotnet test

    - name: Test Kotlin Bindings
      env:
        LD_LIBRARY_PATH: ${{ github.workspace }}/build
        DYLD_LIBRARY_PATH: ${{ github.workspace }}/build
      run: |
        cd bindings/kotlin
        ./gradlew test

    - name: Test Rust Bindings
      env:
        LD_LIBRARY_PATH: ${{ github.workspace }}/build
        DYLD_LIBRARY_PATH: ${{ github.workspace }}/build
      run: |
        cd bindings/rust
        cargo test

    - name: Test Swift Bindings
      env:
        LD_LIBRARY_PATH: ${{ github.workspace }}/build
        DYLD_LIBRARY_PATH: ${{ github.workspace }}/build
      run: |
        cd bindings/swift
        swift test
