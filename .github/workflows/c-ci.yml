name: C CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - '.github/workflows/c-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - '.github/workflows/c-ci.yml'

jobs:
  test_linux:
    name: Test C Core (Linux, ${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake valgrind ${{ matrix.compiler }}

    - name: Configure and Build
      env:
        CC: ${{ matrix.compiler }}
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Debug ..
        make

    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure

    - name: Run Valgrind
      run: |
        cd build
        valgrind --leak-check=full --show-leak-kinds=all --error-exitcode=1 ./test_sandbox

  test_macos:
    name: Test C Core (macOS)
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure and Build
      env:
        CC: clang
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Debug ..
        make

    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure

  test_sanitizers:
    name: Test C Core (ASAN/UBSAN)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Clang
      run: sudo apt-get update && sudo apt-get install -y clang cmake

    - name: Configure and Build with Sanitizers
      env:
        CC: clang
      run: |
        mkdir build_sanitizers
        cd build_sanitizers
        cmake -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g" \
              -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
              ..
        make

    - name: Run Tests with Sanitizers
      env:
        ASAN_OPTIONS: detect_leaks=1
        UBSAN_OPTIONS: print_stacktrace=1
      run: |
        cd build_sanitizers
        ./test_sandbox
